# Authentication configuration
auth:
  required: true
  api_secrets:
    - id: "default"
      secret: "secret-key-1234567890"

sip:
  room_prefix: "sip-" # ENV: SIP_ROOM_PREFIX
  allowed_addresses: # ENV: SIP_ALLOWED_ADDRESSES (comma-separated)
    - "54.172.60.0/30"
    - "54.244.51.0/30"
  hook_secret: "hook-secret-1234567890" # ENV: SIP_HOOK_SECRET (required, min 16 chars)
  hooks: # ENV: SIP_HOOKS_JSON (JSON array with optional "secret" field)
    - host: "example-sip.sayna.ai:5063"
      url: "http://localhost:5002/sayna/webhook"
      auth_id: "default"

